name: Desktop tests

on:
  push:
    paths:
      - "pascribe.py"
      - "pascribe_app/**"
      - "tests/**"
      - "requirements*.txt"
      - "install.ps1"
      - "build.ps1"
      - ".github/workflows/desktop-tests.yml"
  pull_request:
    paths:
      - "pascribe.py"
      - "pascribe_app/**"
      - "tests/**"
      - "requirements*.txt"
      - "install.ps1"
      - "build.ps1"
      - ".github/workflows/desktop-tests.yml"

permissions:
  contents: read

jobs:
  core:
    name: Windows Python ${{ matrix.python-version }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install test dependency
        run: python -m pip install numpy==2.3.5
      - name: Compile desktop sources
        run: python -m compileall -q pascribe.py pascribe_app tests
      - name: Run core tests
        run: python -m unittest discover -s tests -v

  desktop-import:
    name: Windows desktop import smoke test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install desktop dependencies
        run: python -m pip install --requirement requirements.txt
      - name: Import desktop entry point
        env:
          PASCRIBE_DATA_DIR: ${{ runner.temp }}\Pascribe
        run: python -c "import pascribe; print(pascribe.__version__)"
